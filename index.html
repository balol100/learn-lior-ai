<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --sky:#E0F2FE;--lavender:#EDE9FE;--mint:#D1FAE5;--peach:#FED7AA;
  --primary:#A78BFA;--primary-dark:#7C3AED;--secondary:#FB923C;
  --pink:#F472B6;--green:#34D399;--blue:#60A5FA;--yellow:#FBBF24;--red:#F87171;
  --ink:#1F2937;--ink-soft:#4B5563;--muted:#9CA3AF;
  --card:#FFFFFF;--card-soft:#F9FAFB;
  --shadow:0 4px 14px rgba(124,58,237,.12);
  --shadow-lg:0 12px 32px rgba(124,58,237,.18);
  --radius:20px;--radius-sm:14px;
}
html,body{height:100%}
body{
  font-family:'Heebo',system-ui,sans-serif;font-size:18px;color:var(--ink);
  background:linear-gradient(135deg,#E0F2FE 0%,#EDE9FE 50%,#FCE7F3 100%);
  background-attachment:fixed;min-height:100vh;line-height:1.5;
  overflow-x:hidden;
}
h1,h2,h3,.fun{font-family:'Fredoka','Heebo',sans-serif;font-weight:700;letter-spacing:-.02em}
button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:active{transform:scale(.96)}
img{max-width:100%}

/* ===== LAYOUT ===== */
.app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:120px;position:relative}
.topbar{
  position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);
  background:rgba(255,255,255,.85);
  padding:12px 16px;display:flex;align-items:center;gap:10px;
  border-bottom:2px solid rgba(167,139,250,.2);
}
.topbar .greeting{flex:1;display:flex;align-items:center;gap:8px;font-weight:700;font-size:17px}
.topbar .avatar{width:40px;height:40px;border-radius:50%;background:var(--lavender);display:flex;align-items:center;justify-content:center;font-size:24px;border:3px solid var(--primary)}
.stars-pill,.streak-pill{
  display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:999px;
  font-weight:700;font-size:15px;white-space:nowrap;
}
.stars-pill{background:linear-gradient(135deg,#FCD34D,#F59E0B);color:#fff;box-shadow:0 3px 10px rgba(245,158,11,.3)}
.streak-pill{background:linear-gradient(135deg,#FB923C,#EF4444);color:#fff;box-shadow:0 3px 10px rgba(239,68,68,.3)}
.back-btn{
  width:42px;height:42px;border-radius:50%;background:#fff;border:2px solid rgba(167,139,250,.3);
  display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--primary-dark);
  box-shadow:var(--shadow);
}

/* ===== CARDS ===== */
.section{padding:20px 16px}
.section h2{font-size:24px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card{
  background:var(--card);border-radius:var(--radius);padding:18px;
  box-shadow:var(--shadow);border:2px solid rgba(167,139,250,.15);
  margin-bottom:14px;transition:transform .2s,box-shadow .2s;
}
.card.tappable:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.card.tappable:active{transform:translateY(0)}

/* mission card */
.mission{
  background:linear-gradient(135deg,#FEF3C7,#FED7AA);
  border:3px solid #F59E0B;border-radius:var(--radius);padding:16px;margin-bottom:16px;
}
.mission .label{font-size:13px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:.05em}
.mission .title{font-size:20px;font-weight:700;margin:6px 0;color:#7C2D12}
.mission .progress{height:12px;background:rgba(255,255,255,.6);border-radius:999px;overflow:hidden;margin-top:8px}
.mission .progress-fill{height:100%;background:linear-gradient(90deg,#F59E0B,#F97316);border-radius:999px;transition:width .5s}
.mission .progress-text{font-size:14px;color:#92400E;margin-top:6px;font-weight:600}

/* adventure card on home */
.adventure-card{
  background:linear-gradient(135deg,#7C3AED 0%,#A78BFA 60%,#F472B6 100%);
  color:#fff;padding:20px;border-radius:var(--radius);margin-bottom:16px;
  box-shadow:var(--shadow-lg);border:3px solid rgba(255,255,255,.4);position:relative;overflow:hidden;
}
.adventure-card::before{content:"✨";position:absolute;top:8px;left:12px;font-size:24px;opacity:.6;animation:twinkle 3s infinite}
.adventure-card::after{content:"⭐";position:absolute;bottom:8px;left:30px;font-size:18px;opacity:.5;animation:twinkle 2s infinite reverse}
.adventure-card .head{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:700;margin-bottom:8px}
.adventure-card .quote{font-size:15px;opacity:.95;margin:8px 0;font-style:italic}
.adventure-card .progress{height:14px;background:rgba(0,0,0,.2);border-radius:999px;overflow:hidden;margin-top:10px}
.adventure-card .progress-fill{height:100%;background:linear-gradient(90deg,#FBBF24,#F59E0B);border-radius:999px}
.adventure-card .station-text{font-size:14px;margin-top:6px;font-weight:600;opacity:.95}

/* category grid */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cat-tile{
  background:var(--card);border-radius:var(--radius);padding:18px 14px;text-align:center;
  border:3px solid transparent;box-shadow:var(--shadow);transition:.2s;cursor:pointer;
}
.cat-tile.english{border-color:#60A5FA;background:linear-gradient(135deg,#fff,#DBEAFE)}
.cat-tile.math{border-color:#34D399;background:linear-gradient(135deg,#fff,#D1FAE5)}
.cat-tile .icon{font-size:42px;margin-bottom:6px;display:block}
.cat-tile .title{font-size:18px;font-weight:700}
.cat-tile .sub{font-size:13px;color:var(--ink-soft);margin-top:4px}
.cat-tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}

/* sub-categories grid */
.subcat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.subcat-tile{
  background:#fff;border-radius:var(--radius-sm);padding:16px 10px;text-align:center;
  border:3px solid #E0E7FF;box-shadow:var(--shadow);cursor:pointer;transition:.2s;
  min-height:120px;display:flex;flex-direction:column;justify-content:center;
}
.subcat-tile:hover{transform:scale(1.02);border-color:var(--primary)}
.subcat-tile .icon{font-size:38px;margin-bottom:6px}
.subcat-tile .name{font-weight:700;font-size:16px}
.subcat-tile .progress-bar{height:6px;background:#E5E7EB;border-radius:999px;margin-top:10px;overflow:hidden}
.subcat-tile .progress-bar-fill{height:100%;background:linear-gradient(90deg,#34D399,#10B981);border-radius:999px}
.subcat-tile.locked{opacity:.55;filter:saturate(.5)}
.subcat-tile.locked::after{content:"🔒";display:block;margin-top:4px;font-size:18px}

/* trophies */
.trophy-row{display:flex;flex-wrap:wrap;gap:10px}
.trophy{
  width:72px;height:72px;border-radius:50%;background:#fff;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:30px;border:3px solid #FCD34D;
  box-shadow:var(--shadow);position:relative;
}
.trophy.locked{filter:grayscale(1);opacity:.4;border-color:#D1D5DB}
.trophy .label{font-size:10px;font-weight:700;position:absolute;bottom:-22px;white-space:nowrap}

/* ===== BUTTONS ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-height:52px;padding:12px 22px;border-radius:999px;font-weight:700;font-size:18px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;
  box-shadow:0 6px 18px rgba(124,58,237,.35);transition:.18s;border:3px solid rgba(255,255,255,.3);
}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(124,58,237,.45)}
.btn.full{width:100%}
.btn.success{background:linear-gradient(135deg,#34D399,#10B981);box-shadow:0 6px 18px rgba(16,185,129,.4)}
.btn.warn{background:linear-gradient(135deg,#FB923C,#EF4444);box-shadow:0 6px 18px rgba(239,68,68,.35)}
.btn.ghost{background:#fff;color:var(--primary-dark);border:3px solid var(--primary);box-shadow:var(--shadow)}

/* ===== QUESTION SCREEN ===== */
.question-wrap{padding:16px;display:flex;flex-direction:column;gap:14px}
.q-header{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:16px}
.q-progress{flex:1;margin:0 12px;height:10px;background:#fff;border-radius:999px;overflow:hidden;border:2px solid rgba(167,139,250,.3)}
.q-progress-fill{height:100%;background:linear-gradient(90deg,#A78BFA,#F472B6);border-radius:999px;transition:width .4s}
.q-card{
  background:#fff;border-radius:24px;padding:24px;text-align:center;
  border:4px solid var(--primary);box-shadow:var(--shadow-lg);
}
.q-prompt{font-size:18px;color:var(--ink-soft);margin-bottom:12px;font-weight:600}
.q-content{font-size:64px;margin:14px 0;line-height:1.1;font-weight:700;color:var(--primary-dark);font-family:'Fredoka',sans-serif}
.q-content.small{font-size:36px}
.q-content.tiny{font-size:24px}
.q-emoji{font-size:96px;line-height:1;margin:10px 0}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.choice{
  min-height:64px;padding:14px;background:#fff;border:3px solid #E0E7FF;border-radius:18px;
  font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;
  transition:.18s;color:var(--ink);box-shadow:0 3px 10px rgba(0,0,0,.06);
}
.choice:hover{border-color:var(--primary);transform:translateY(-2px);background:#FAF5FF}
.choice.right{background:linear-gradient(135deg,#34D399,#10B981);color:#fff;border-color:#10B981;animation:popIn .35s}
.choice.wrong{background:linear-gradient(135deg,#FCA5A5,#F87171);color:#fff;border-color:#EF4444;animation:shake .4s}
.choice.dim{opacity:.5}

/* type input */
.type-row{display:flex;gap:8px;align-items:center}
.type-input{
  flex:1;padding:14px;border:3px solid var(--primary);border-radius:14px;font-size:22px;
  font-weight:700;text-align:center;font-family:inherit;background:#fff;color:var(--ink);
}
.type-input:focus{outline:none;border-color:var(--primary-dark);box-shadow:0 0 0 4px rgba(167,139,250,.2)}

/* feedback toast */
.feedback{
  position:fixed;top:20%;left:50%;transform:translateX(-50%);
  padding:18px 32px;border-radius:24px;font-weight:800;font-size:26px;color:#fff;z-index:200;
  pointer-events:none;animation:popIn .3s,fadeOut .3s 1.2s forwards;
  box-shadow:0 10px 40px rgba(0,0,0,.3);
  font-family:'Fredoka',sans-serif;
}
.feedback.right{background:linear-gradient(135deg,#34D399,#059669)}
.feedback.wrong{background:linear-gradient(135deg,#F87171,#DC2626)}
.feedback.epic{background:linear-gradient(135deg,#FBBF24,#F59E0B,#EC4899);font-size:32px}

/* adventure map */
.map-wrap{padding:14px;position:relative}
.map-bg{
  background:linear-gradient(180deg,#7DD3FC 0%,#A78BFA 50%,#1E1B4B 100%);
  border-radius:24px;padding:20px 12px;color:#fff;position:relative;overflow:hidden;min-height:600px;
}
.map-bg::before{content:"☁️ ☁️   ☁️";position:absolute;top:10px;left:0;right:0;text-align:center;font-size:28px;opacity:.7}
.map-stations{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:60px;position:relative;z-index:1}
.station{
  aspect-ratio:1;border-radius:16px;background:rgba(255,255,255,.2);border:3px solid rgba(255,255,255,.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:24px;font-weight:700;
  position:relative;transition:.2s;
}
.station.done{background:linear-gradient(135deg,#34D399,#10B981);border-color:#fff}
.station.current{background:linear-gradient(135deg,#FBBF24,#F59E0B);border-color:#fff;animation:pulse 1.6s infinite}
.station.boss{background:linear-gradient(135deg,#EF4444,#7C2D12);border-color:#FCD34D}
.station.boss.done{background:linear-gradient(135deg,#10B981,#065F46)}
.station.locked{opacity:.5}
.station.age-locked-station{opacity:.4;filter:saturate(.4)}
.subcat-tile.age-locked{opacity:.55;filter:saturate(.45);cursor:not-allowed}
.subcat-tile.age-locked:hover{transform:none;border-color:#E0E7FF}
.station .num{font-size:14px;position:absolute;top:2px;right:4px;font-weight:700;background:rgba(0,0,0,.3);padding:0 4px;border-radius:4px}
.character-row{display:flex;justify-content:center;gap:10px;font-size:54px;margin-top:18px}
.character-row .char{animation:bob 2s infinite ease-in-out}
.world-banner{
  background:rgba(0,0,0,.3);padding:10px 14px;border-radius:14px;margin-bottom:14px;text-align:center;
  font-weight:700;font-size:18px;
}

/* speech bubble */
.bubble{
  background:#fff;color:var(--ink);padding:18px 20px;border-radius:20px;position:relative;
  margin:14px auto 4px;max-width:90%;box-shadow:var(--shadow-lg);border:3px solid var(--primary);font-size:17px;line-height:1.5;
}
.bubble::after{content:"";position:absolute;bottom:-12px;right:30px;width:0;height:0;
  border-left:14px solid transparent;border-right:14px solid transparent;border-top:14px solid #fff;}

/* footer */
footer{text-align:center;padding:24px 16px;color:var(--ink-soft);font-size:14px;line-height:1.8}
footer a{color:var(--primary-dark);font-weight:700;text-decoration:none}
footer .links{display:flex;justify-content:center;flex-wrap:wrap;gap:14px;margin:10px 0}
footer .links button{color:var(--primary-dark);font-weight:600;font-size:13px;text-decoration:underline;padding:4px 8px}

/* modal */
.modal-bg{
  position:fixed;inset:0;background:rgba(31,41,55,.7);backdrop-filter:blur(4px);
  z-index:300;display:none;align-items:center;justify-content:center;padding:14px;
}
.modal-bg.show{display:flex;animation:fadeIn .2s}
.modal{
  background:#fff;border-radius:24px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;
  padding:24px;border:3px solid var(--primary);box-shadow:var(--shadow-lg);
}
.modal h3{font-size:24px;margin-bottom:12px}
.modal p,.modal li{margin-bottom:8px;font-size:15px;line-height:1.6}
.modal ul{padding-right:20px}
.modal .close{float:left;width:36px;height:36px;border-radius:50%;background:#F3F4F6;font-size:22px;font-weight:700}

/* accessibility panel */
.a11y-fab{
  position:fixed;bottom:20px;right:14px;width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:#fff;font-size:24px;
  box-shadow:0 8px 22px rgba(29,78,216,.4);z-index:80;display:flex;align-items:center;justify-content:center;
  border:3px solid #fff;
}
.a11y-panel button{display:block;width:100%;padding:12px;margin:6px 0;background:#F3F4F6;border-radius:12px;font-weight:600;font-size:15px;text-align:right}
.a11y-panel button:hover{background:#E5E7EB}

body.a11y-large{font-size:22px}
body.a11y-large .q-content{font-size:80px}
body.a11y-xlarge{font-size:26px}
body.a11y-contrast{filter:contrast(1.4)}
body.a11y-mono{filter:grayscale(1)}
body.a11y-readable *{font-family:'Heebo',sans-serif!important;letter-spacing:.02em}
body.a11y-no-anim *{animation:none!important;transition:none!important}
body.a11y-links a,body.a11y-links button{text-decoration:underline!important}

/* tts pronunciation button */
.speak-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:#3B82F6;color:#fff;border-radius:999px;font-weight:700;font-size:15px;box-shadow:var(--shadow)}

/* multiplication grid */
.mult-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mult-tile{
  background:#fff;border:3px solid #C7D2FE;border-radius:16px;padding:16px 8px;text-align:center;
  font-weight:700;cursor:pointer;transition:.2s;
}
.mult-tile.mastered{background:linear-gradient(135deg,#34D399,#10B981);color:#fff;border-color:#10B981}
.mult-tile.partial{background:linear-gradient(135deg,#FCD34D,#F59E0B);color:#fff;border-color:#F59E0B}
.mult-tile .num{font-size:32px;display:block;line-height:1}
.mult-tile .label{font-size:12px;display:block;margin-top:4px;opacity:.85}

/* level title */
.level-title{
  background:linear-gradient(135deg,#FCD34D,#F59E0B);
  color:#7C2D12;padding:8px 14px;border-radius:14px;font-weight:700;font-size:15px;text-align:center;margin-bottom:10px;
  box-shadow:var(--shadow);border:2px solid rgba(255,255,255,.5);
}

/* visual addition aids */
.dots-vis{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin:10px 0;font-size:32px}

/* confetti */
.confetti{position:fixed;width:10px;height:10px;top:-20px;z-index:400;pointer-events:none;border-radius:2px}

/* sparkle */
.sparkle{position:fixed;font-size:22px;pointer-events:none;z-index:400;animation:sparkleAnim 1.2s ease-out forwards}

/* install prompt */
.install-banner{
  position:fixed;bottom:18px;left:14px;right:14px;max-width:494px;margin:auto;
  background:linear-gradient(135deg,#A78BFA,#7C3AED);color:#fff;padding:14px;border-radius:18px;
  box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;z-index:90;display:none;border:3px solid rgba(255,255,255,.3);
}
.install-banner.show{display:flex}
.install-banner .text{flex:1;font-weight:600;font-size:14px}
.install-banner button{padding:8px 14px;border-radius:999px;font-weight:700;font-size:14px}
.install-banner .install{background:#fff;color:var(--primary-dark)}

   ============================================================ */
const STORAGE_KEY = 'learn-lior-progress';
const DEFAULT_STATE = {
  profile: { name: '', avatar: '👦', ageGroup: '', createdAt: Date.now() },
  adventure: { currentStation: 1, completed: [], companions: [] },
  english: { categories: {}, abc: {} },
  math: { categories: {}, multiplication: {} },
  stars: { total: 0, today: 0, lastTodayDate: '', history: [] },
  streak: { current: 0, longest: 0, lastDate: '' },
  missions: { daily: null, weekly: null },
  achievements: [],
  settings: { soundEnabled: true, ttsEnabled: true },
  stats: { totalAnswered: 0, totalCorrect: 0, sessionStreak: 0, bestStreak: 0 }
};

let state = loadState();

function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
    return Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), JSON.parse(raw));
  } catch(e){ return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
}
function saveState(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
}
function resetProgress(){
  if(confirm('בטוח שברצונך לאפס את כל ההתקדמות?')){
    localStorage.removeItem(STORAGE_KEY);
    state = loadState();
    saveState(); render();
  }
}
function todayStr(){ return new Date().toISOString().slice(0,10); }

/* ============================================================
   SOUND (Web Audio synthesized)
   ============================================================ */
let audioCtx = null;
function getCtx(){
  if(!audioCtx){
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone(freq, dur, type='sine', vol=.18, when=0){
  const ctx = getCtx(); if(!ctx || !state.settings.soundEnabled) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, ctx.currentTime + when);
  gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + when + .015);
  gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + when + dur);
  osc.connect(gain).connect(ctx.destination);
  osc.start(ctx.currentTime + when);
  osc.stop(ctx.currentTime + when + dur + .05);
}
function playSound(type){
  if(!state.settings.soundEnabled) return;
  switch(type){
    case 'right':
      tone(523.25, .12, 'sine', .2, 0);
      tone(659.25, .12, 'sine', .2, .08);
      tone(783.99, .25, 'sine', .22, .16);
      break;
    case 'wrong':
      tone(196, .25, 'sine', .12, 0);
      tone(174.61, .35, 'sine', .12, .12);
      break;
    case 'levelUp':
      [523.25, 659.25, 783.99, 1046.5].forEach((f,i)=>tone(f, .2, 'triangle', .22, i*.1));
      tone(1318.5, .4, 'triangle', .2, .5);
      break;
    case 'star':
      tone(1568, .08, 'sine', .15, 0);
      tone(2093, .12, 'sine', .15, .06);
      break;
    case 'mission':
      tone(392, .15, 'sawtooth', .12, 0);
      tone(523.25, .15, 'sawtooth', .12, .12);
      tone(659.25, .25, 'sawtooth', .14, .24);
      break;
    case 'click':
      tone(440, .05, 'square', .08, 0);
      break;
  }
}

/* TTS */
function speak(text, lang='en-US'){
  if(!state.settings.ttsEnabled || !window.speechSynthesis) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = .8; u.pitch = 1.05;
    speechSynthesis.speak(u);
  } catch(e){}
}

function stationData(n){
  const isBoss = n % 5 === 0;
  let world = 'forest', icon = '🌳';
  if(n > 10){ world='ice'; icon='❄️'; }
  if(n > 20){ world='castle'; icon='🏰'; }
  if(isBoss) icon = ['🐺','🦅','🐉','🐲','🦇','👑'][Math.floor((n/5)-1)] || '👹';
  return {n, world, icon, isBoss, story: getStationStory(n), questions: isBoss?7:5};
}

  {min:1,max:5,title:'🌱 חוקר צעיר'},

];
function levelTitle(station){
  for(const t of LEVEL_TITLES){ if(station>=t.min && station<=t.max) return t.title; }
  return '👑 מלך האלופים';
}
function levelUpMessage(justFinishedStation){
  const next = justFinishedStation + 1;
  const wasLast = LEVEL_TITLES.find(t=>t.max===justFinishedStation);
  const newLevel = LEVEL_TITLES.find(t=>t.min===next);
  if(wasLast && newLevel){
    return `🎊 ${getName()} עלה לדרגת ${newLevel.title}!<br><br>`;
  }
  return '';
}

/* ============================================================
   MISSION SYSTEM
   ============================================================ */
function generateDailyMission(){
  const today = todayStr();
  if(state.missions.daily && state.missions.daily.date === today) return state.missions.daily;
  const pool = [
    {id:'math10', text:'ענה על 10 שאלות חשבון', target:10, reward:5, kind:'math'},
    {id:'eng10', text:'ענה על 10 שאלות אנגלית', target:10, reward:5, kind:'english'},
    {id:'station3', text:'השלם 3 תחנות במסע', target:3, reward:8, kind:'station'},
    {id:'streak15', text:'15 תשובות נכונות ברצף', target:15, reward:10, kind:'streak'},
    {id:'stars20', text:'אסוף 20 כוכבים היום', target:20, reward:5, kind:'stars'}
  ];
  const m = pool[Math.floor(Math.random()*pool.length)];
  state.missions.daily = {...m, progress:0, completed:false, date:today};
  saveState();
  return state.missions.daily;
}
function progressMission(kind, amount=1){
  const m = state.missions.daily;
  if(!m || m.completed || m.kind !== kind) return;
  m.progress = Math.min(m.target, m.progress + amount);
  if(m.progress >= m.target && !m.completed){
    m.completed = true;
    addStars(m.reward, 'mission');
    showFeedback(`🎉 משימה הושלמה! +${m.reward} כוכבים`, 'epic');
    playSound('mission');
    confettiBurst();
  }
  saveState();
}

/* ============================================================
   STARS, STREAK, ACHIEVEMENTS
   ============================================================ */
function addStars(n=1, source='answer'){
  const today = todayStr();
  if(state.stars.lastTodayDate !== today){ state.stars.today = 0; state.stars.lastTodayDate = today; }
  state.stars.total += n;
  state.stars.today += n;
  if(source === 'answer') progressMission('stars', n);
  saveState();
  updateTopBar();
  checkStarAchievements();
}
function checkStarAchievements(){
  const t = state.stars.total;
  if(t>=50) unlockAchievement('stars50');
  if(t>=100) unlockAchievement('stars100');
  if(t>=500) unlockAchievement('stars500');
}
function unlockAchievement(id){
  if(state.achievements.find(a=>a.id===id)) return;
  const def = ACHIEVEMENTS.find(a=>a.id===id);
  if(!def) return;
  state.achievements.push({id, earnedAt:Date.now()});
  saveState();
  showFeedback(`🏆 הישג חדש: ${def.emoji} ${def.name}`, 'epic');
  playSound('levelUp');
  confettiBurst();
}
function updateStreak(correct){
  if(correct){
    state.stats.sessionStreak++;
    if(state.stats.sessionStreak > state.stats.bestStreak) state.stats.bestStreak = state.stats.sessionStreak;
    if(state.stats.sessionStreak >= 10) unlockAchievement('streak10');
    if(state.stats.sessionStreak >= 25) unlockAchievement('streak25');
    progressMission('streak', 1);
  } else {
    state.stats.sessionStreak = 0;
  }
  saveState();
}
function updateDailyStreak(){
  const today = todayStr();
  if(state.streak.lastDate === today) return;
  const y = new Date(); y.setDate(y.getDate()-1);
  const yest = y.toISOString().slice(0,10);
  if(state.streak.lastDate === yest){ state.streak.current++; }
  else if(state.streak.lastDate !== today){ state.streak.current = 1; }
  state.streak.lastDate = today;
  if(state.streak.current > state.streak.longest) state.streak.longest = state.streak.current;
  if(state.streak.current >= 7) unlockAchievement('daily7');
  saveState();
}

/* ============================================================
   FEEDBACK / CONFETTI / SPARKLE
   ============================================================ */
function showFeedback(text, kind='right'){
  const el = document.createElement('div');
  el.className = `feedback ${kind}`;
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1700);
}
function confettiBurst(){
  const colors = ['#A78BFA','#F472B6','#FBBF24','#34D399','#60A5FA','#FB923C'];
  for(let i=0;i<60;i++){
    const el = document.createElement('div');
    el.className='confetti';
    el.style.left = (Math.random()*100)+'%';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animation = `confettiFall ${1.5+Math.random()*1.5}s linear ${Math.random()*.4}s forwards`;
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    el.style.borderRadius = Math.random()>.5?'50%':'2px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 3500);
  }
}
function sparkleAt(x,y,n=8){
  for(let i=0;i<n;i++){
    const el = document.createElement('div');
    el.className='sparkle';
    el.textContent = ['✨','⭐','💫'][Math.floor(Math.random()*3)];
    el.style.left = x+'px';
    el.style.top = y+'px';
    const ang = Math.random()*Math.PI*2;
    const dist = 60 + Math.random()*60;
    el.style.setProperty('--dx', Math.cos(ang)*dist+'px');
    el.style.setProperty('--dy', Math.sin(ang)*dist+'px');
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 1300);
  }
}

/* ============================================================
   NAVIGATION
   ============================================================ */
let route = {screen:'home', params:{}};
const history_ = [];
function go(screen, params={}){
  history_.push({...route});
  route = {screen, params};
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}
function back(){
  if(history_.length){ route = history_.pop(); render(); }
  else { route = {screen:'home',params:{}}; render(); }
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ============================================================
   RENDER ROOT
   ============================================================ */
function render(){
  updateTopBar();
  document.getElementById('backBtn').classList.toggle('hidden', route.screen==='home');
  const main = document.getElementById('main');
  switch(route.screen){
    case 'home': main.innerHTML = renderHome(); attachHomeEvents(); break;
    case 'adventure': main.innerHTML = renderAdventureMap(); attachAdventureEvents(); break;
    case 'station': main.innerHTML = renderStationIntro(route.params); attachStationIntroEvents(); break;
    case 'english': main.innerHTML = renderEnglishCategories(); attachCatEvents('english'); break;
    case 'math': main.innerHTML = renderMathCategories(); attachCatEvents('math'); break;
    case 'mult-grid': main.innerHTML = renderMultGrid(); attachMultGridEvents(); break;
    case 'play': main.innerHTML = `<div id="playArea"></div>`; startSession(route.params); break;
    case 'achievements': main.innerHTML = renderAchievements(); break;
  }
}

  document.getElementById('topAvatar').textContent = state.profile.avatar;

  const baseGreeting = isReturn ? `שלום ${getName()}, חזרת!` : `שלום ${getName()}!`;

  document.getElementById('starsPill').textContent = `⭐ ${state.stars.total}`;
  document.getElementById('streakPill').textContent = `🔥 ${state.streak.current}`;
}

/* ============================================================
   ADVENTURE MAP
   ============================================================ */
function renderAdventureMap(){
  const adv = state.adventure;
  const maxAge = ageConfig().adventure.maxStation;
  const stations = [];
  for(let i=1;i<=30;i++){
    const sd = stationData(i);
    const done = adv.completed.includes(i);
    const current = adv.currentStation === i && i<=maxAge;
    const ageLocked = i > maxAge;
    const progLocked = i > adv.currentStation;
    const locked = ageLocked || progLocked;
    let cls = 'station';
    if(sd.isBoss) cls += ' boss';
    if(done) cls += ' done';
    else if(current) cls += ' current';
    else if(locked) cls += ' locked';
    if(ageLocked) cls += ' age-locked-station';
    stations.push(`<div class="${cls}" data-station="${i}" data-age-locked="${ageLocked}">
      <span class="num">${i}</span>${done?'✓':(ageLocked?'🔒':sd.icon)}
    </div>`);
  }
  let world='היער הקסום 🌳';
  if(adv.currentStation>10) world='ממלכת הקרח 🧊';
  if(adv.currentStation>20) world='הטירה האפלה 🏰';
  if(adv.completed.length===30) world='👑 הנסיכה ניצלה!';

  const companions = [];
  if(adv.completed.length>=5) companions.push('🐕');
  if(adv.completed.length>=10) companions.push('🐱');
  if(adv.completed.length>=20) companions.push('🦅');

  return `
  <div class="map-wrap">
    <div class="level-title">${levelTitle(adv.currentStation)}</div>
    <div class="world-banner">${world}</div>
    <div class="map-bg">
      <div class="map-stations">${stations.join('')}</div>
      <div class="character-row">
        <span class="char">${state.profile.avatar}</span>
        ${companions.map(c=>`<span class="char">${c}</span>`).join('')}
      </div>
    </div>
    <div style="text-align:center;padding:14px;color:var(--ink-soft);font-size:14px">
      🌟 השלימו את כל 30 התחנות כדי להציל את הנסיכה!
    </div>
  </div>`;
}
function attachAdventureEvents(){
  document.querySelectorAll('.station').forEach(el=>{
    el.addEventListener('click',()=>{
      const n = +el.dataset.station;
      if(el.dataset.ageLocked === 'true'){
        playSound('wrong');
        showFeedback('🔒 פתח קבוצת גיל גבוהה יותר', 'wrong');
        return;
      }
      if(n > state.adventure.currentStation){
        playSound('wrong');

      playSound('click');

/* ============================================================
   QUESTION GENERATORS
   ============================================================ */
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function pickPraise(){
  const N = getName();
  return pick([
    `🎉 ${N}, כל הכבוד!`,
    `⭐ מצוין ${N}!`,
    `🌟 כל הכבוד ${N}!`,
    `🚀 ${N}, אתה אלוף!`,
    `🎯 בול ${N}!`,
    `💪 חזק ${N}!`,
    `🏆 ${N}, יפה מאוד!`
  ]);
}
function pickDifferent(a, exclude, n){
  const opts = a.filter(x=>x!==exclude);
  return shuffle(opts).slice(0,n);
}

/* English question — given a list item, build a 4-choice question */
function makeEnglishQ(item, listAll, type){
  type = type || pick(['emoji2word','he2en','en2he','typeWord']);
  if(item.l){ // ABC
    const subset = listAll;
    if(type==='emoji2word' || type==='abc-letter'){
      const wrongs = pickDifferent(subset.map(x=>x.l), item.l, 3);
      const opts = shuffle([item.l, ...wrongs]);
      return {
        prompt:'איזו אות?',
        content:item.e,
        contentClass:'q-emoji',
        choices:opts,
        answer:item.l,
        speak:item.w,
        speakLang:'en-US'
      };
    }
    // letter→word
    const wrongs = pickDifferent(subset.map(x=>x.w), item.w, 3);
    return {
      prompt:'איזו מילה מתחילה באות הזו?',
      content:item.l,
      contentClass:'',
      choices:shuffle([item.w, ...wrongs]),
      answer:item.w,
      speak:item.w
    };
  }
  if(item.n!==undefined){ // numbers
    if(type==='emoji2word' || type==='num2word'){
      const wrongs = pickDifferent(listAll.map(x=>x.w), item.w, 3);
      return {prompt:'איך אומרים את המספר?', content:String(item.n), contentClass:'q-content ltr', choices:shuffle([item.w,...wrongs]), answer:item.w, speak:item.w};
    }
    if(type==='he2en'){
      const wrongs = pickDifferent(listAll.map(x=>x.w), item.w, 3);
      return {prompt:'תרגם לאנגלית', content:item.he, contentClass:'q-content tiny', choices:shuffle([item.w,...wrongs]), answer:item.w, speak:item.w};
    }
    const wrongs = pickDifferent(listAll.map(x=>x.n), item.n, 3);
    return {prompt:'איזה מספר?', content:item.w, contentClass:'q-content small', choices:shuffle([item.n,...wrongs]).map(String), answer:String(item.n), speak:item.w, ltrChoices:true};
  }
  // generic list
  if(type==='emoji2word'){
    const wrongs = pickDifferent(listAll.map(x=>x.w), item.w, 3);
    return {prompt:'מה זה באנגלית?', content:item.e, contentClass:'q-emoji', choices:shuffle([item.w,...wrongs]), answer:item.w, speak:item.w};
  }
  if(type==='he2en'){
    const wrongs = pickDifferent(listAll.map(x=>x.w), item.w, 3);
    return {prompt:'תרגם לאנגלית', content:item.he, contentClass:'q-content tiny', choices:shuffle([item.w,...wrongs]), answer:item.w, speak:item.w};
  }
  if(type==='en2he'){
    const wrongs = pickDifferent(listAll.map(x=>x.he), item.he, 3);
    return {prompt:'מה זה אומר?', content:item.w, contentClass:'q-content small', choices:shuffle([item.he,...wrongs]), answer:item.he, speak:item.w};
  }
  if(type==='typeWord'){
    return {prompt:'הקלד את המילה באנגלית', content:item.e, contentClass:'q-emoji', input:true, answer:item.w, speak:item.w};
  }
  // fallback
  const wrongs = pickDifferent(listAll.map(x=>x.w), item.w, 3);
  return {prompt:'מה זה באנגלית?', content:item.e, contentClass:'q-emoji', choices:shuffle([item.w,...wrongs]), answer:item.w, speak:item.w};
}

/* Math question */
function makeMathQ(cat, opts={}){
  const level = opts.level || 1;
  const table = opts.table;
  const mcfg = ageConfig().math;
  if(cat==='add'){
    const baseMax = level===1?10:level===2?20:100;
    const max = Math.max(2, Math.min(baseMax, mcfg.maxAdd));
    const a = Math.floor(Math.random()*(max-1))+1;
    const b = Math.floor(Math.random()*(max-a))+1;
    const ans = a+b;
    const wrongs = uniqueWrongs(ans, max*2, 3);
    return {prompt:'כמה זה?', content:`${a} + ${b}`, contentClass:'q-content ltr', choices:shuffle([ans,...wrongs]).map(String), answer:String(ans), visualDots: a+b<=20?a+b:0, dotsSplit:[a,b], ltrChoices:true};
  }
  if(cat==='sub'){
    if(mcfg.maxSub<=0) return makeMathQ('add', opts);
    const baseMax = level===1?10:level===2?20:100;
    const max = Math.max(2, Math.min(baseMax, mcfg.maxSub));
    const a = Math.floor(Math.random()*max)+1;
    const b = Math.floor(Math.random()*a)+1;
    const ans = a-b;
    const wrongs = uniqueWrongs(ans, max, 3);
    return {prompt:'כמה זה?', content:`${a} - ${b}`, contentClass:'q-content ltr', choices:shuffle([ans,...wrongs]).map(String), answer:String(ans), ltrChoices:true};
  }
  if(cat==='mult'){
    const allowed = mcfg.multTables;
    if(!allowed || !allowed.length) return makeMathQ('add', opts);
    const t = table || pick(allowed);
    const maxFact = mcfg.multTables.length<5 ? 5 : 12;
    const b = Math.floor(Math.random()*maxFact)+1;
    const ans = t*b;
    const wrongs = uniqueWrongs(ans, Math.max(50, t*maxFact), 3);
    return {prompt:`לוח ${t}`, content:`${t} × ${b}`, contentClass:'q-content ltr', choices:shuffle([ans,...wrongs]).map(String), answer:String(ans), multTable:t, multFact:b, ltrChoices:true};
  }
  if(cat==='div'){
    if(!mcfg.allowDiv) return makeMathQ('add', opts);
    const b = Math.floor(Math.random()*9)+2;
    const ans = Math.floor(Math.random()*9)+2;
    const a = b*ans;
    const wrongs = uniqueWrongs(ans, 12, 3);
    return {prompt:'כמה זה?', content:`${a} ÷ ${b}`, contentClass:'q-content ltr', choices:shuffle([ans,...wrongs]).map(String), answer:String(ans), ltrChoices:true};
  }
  if(cat==='mixed'){
    if(!mcfg.allowMixed) return makeMathQ('add', opts);
    return makeMixedChallenge();
  }
  return makeMathQ('add', {level:1});
}
function uniqueWrongs(ans, max, n){
  const out = new Set();
  let tries=0;
  while(out.size<n && tries<60){
    const delta = Math.floor(Math.random()*Math.max(6,Math.floor(max/4)))+1;
    const sign = Math.random()<.5?-1:1;
    let v = ans + delta*sign;
    if(v<0) v = ans + delta;
    if(v!==ans) out.add(v);
    tries++;
  }
  while(out.size<n) out.add(ans + out.size + 1);
  return [...out];
}
function makeMixedChallenge(){
  const k = pick(['missing','compare','order']);
  if(k==='missing'){
    const a = Math.floor(Math.random()*9)+1;
    const ans = Math.floor(Math.random()*9)+1;
    const sum = a+ans;
    const wrongs = uniqueWrongs(ans, 20, 3);
    return {prompt:'מצא את המספר החסר', content:`${a} + ? = ${sum}`, contentClass:'q-content ltr', choices:shuffle([ans,...wrongs]).map(String), answer:String(ans), ltrChoices:true};
  }
  if(k==='compare'){
    const a = Math.floor(Math.random()*9)+2, b=Math.floor(Math.random()*9)+2;
    const c = Math.floor(Math.random()*9)+2, d=Math.floor(Math.random()*9)+2;
    const v1 = a*b, v2 = c*d;
    if(v1===v2){ return makeMixedChallenge(); }
    const ans = v1>v2?`${a}×${b}`:`${c}×${d}`;
    return {prompt:'מי גדול יותר?', content:`${a}×${b}   ?   ${c}×${d}`, contentClass:'q-content small ltr', choices:[`${a}×${b}`,`${c}×${d}`,'שווים'], answer:ans, ltrChoices:true};
  }
  if(k==='order'){
    const nums = [];
    while(nums.length<4){ const n=Math.floor(Math.random()*30)+1; if(!nums.includes(n)) nums.push(n); }
    const sorted = [...nums].sort((x,y)=>x-y);
    const wrong1 = shuffle([...nums]);
    const wrong2 = [...nums].sort((x,y)=>y-x);
    const ans = sorted.join(', ');
    const choices = shuffle([ans, wrong1.join(', '), wrong2.join(', ')]);
    return {prompt:'סדר מהקטן לגדול', content:nums.join(', '), contentClass:'q-content small ltr', choices, answer:ans, ltrChoices:true};
  }
}

/* ============================================================
   PLAY SESSION
   ============================================================ */
let session = null;
function startSession(params){
  session = {
    params,
    questions:[],
    current:0,
    correct:0,
    answered:0,
    pass: params.mode==='station' ? Math.ceil((stationData(params.station).questions)*ageConfig().adventure.passRatio) : null,
    total: params.mode==='station' ? stationData(params.station).questions : 10,
    locked:false
  };
  buildQuestions();
  renderQuestion();
}

function dataForCategory(cat){
  const ecfg = ageConfig().english;
  let data = cat.data;
  if(cat.type==='abc' && ecfg.abcMax && ecfg.abcMax < cat.data.length){
    data = cat.data.slice(0, ecfg.abcMax);
  }
  if(cat.type==='numbers' && ecfg.maxNumbers && ecfg.maxNumbers < cat.data.length){
    data = cat.data.slice(0, ecfg.maxNumbers);
  }
  return data;
}
function typesForCategory(cat){
  const allowed = ageConfig().english.types;
  const base = cat.type==='abc' ? ['emoji2word','letter2word']
             : cat.type==='numbers' ? ['emoji2word','he2en']
             : ['emoji2word','he2en','en2he','typeWord'];
  const intersect = base.filter(t=>allowed.includes(t) || t==='letter2word');
  return intersect.length ? intersect : ['emoji2word'];
}

function buildQuestions(){
  const p = session.params;
  if(p.mode==='station'){
    const sd = stationData(p.station);
    for(let i=0;i<sd.questions;i++){
      session.questions.push(buildOneStationQuestion(p.station));
    }
  } else if(p.mode==='english'){
    const cat = ENGLISH_CATEGORIES.find(c=>c.id===p.cat);
    const data = dataForCategory(cat);
    const types = typesForCategory(cat);
    for(let i=0;i<10;i++){
      const item = pick(data);
      session.questions.push({...makeEnglishQ(item, data, pick(types)), domain:'english'});
    }
  } else if(p.mode==='math'){
    const cat = p.cat;
    if(cat==='mult' && p.table){
      const facts = shuffle(Array.from({length:12}, (_,i)=>i+1));
      for(let i=0;i<10;i++){
        const b = facts[i % facts.length];
        const ans = p.table*b;
        const wrongs = uniqueWrongs(ans, 144, 3);
        session.questions.push({prompt:`לוח ${p.table}`, content:`${p.table} × ${b}`, contentClass:'q-content ltr', choices:shuffle([ans,...wrongs]).map(String), answer:String(ans), multTable:p.table, multFact:b, ltrChoices:true, domain:'math'});
      }
    } else {
      for(let i=0;i<10;i++){
        const lvl = (i<3)?1:(i<7)?2:3;
        session.questions.push({...makeMathQ(cat,{level:lvl}), domain:'math'});
      }
    }
  }
}

function buildOneStationQuestion(stationN){
  const mcfg = ageConfig().math;
  const ecfg = ageConfig().english;
  const useMath = Math.random() < .5;
  if(useMath){
    let pool, level;
    if(stationN<=10){ pool = ['add','sub']; level = 1; }
    else if(stationN<=20){ pool = ['add','sub','mult']; level = 2; }
    else { pool = ['add','sub','mult','div','mixed']; level = stationN<=25?2:3; }
    pool = pool.filter(c=>mcfg.cats.includes(c));
    if(!pool.length) pool = ['add'];
    return {...makeMathQ(pick(pool),{level}), domain:'math'};
  } else {
    let allCats = stationN<=10 ? ENGLISH_CATEGORIES.slice(0,4)
                : stationN<=20 ? ENGLISH_CATEGORIES.slice(0,6)
                : ENGLISH_CATEGORIES;
    if(ecfg.cats !== 'all') allCats = allCats.filter(c=>ecfg.cats.includes(c.id));
    if(!allCats.length) allCats = ENGLISH_CATEGORIES.filter(c=>ecfg.cats==='all' || ecfg.cats.includes(c.id));
    if(!allCats.length) return {...makeMathQ('add',{level:1}), domain:'math'};
    const cat = pick(allCats);
    const data = dataForCategory(cat);
    const types = typesForCategory(cat);
    const item = pick(data);
    return {...makeEnglishQ(item, data, pick(types)), domain:'english'};
  }
}

function renderQuestion(){
  const q = session.questions[session.current];
  if(!q){ return finishSession(); }
  const total = session.questions.length;
  const pct = ((session.current)/total)*100;

  const dots = q.visualDots ? `<div class="dots-vis">${'🔵'.repeat(q.dotsSplit[0])} ${q.dotsSplit[1]?'+ ':''}${'🟢'.repeat(q.dotsSplit[1]||0)}</div>`:'';

  let bodyHTML = '';
  if(q.input){
    bodyHTML = `
      <div class="type-row">
        <input type="text" id="answerInput" class="type-input" autocomplete="off" autocapitalize="off" placeholder="הקלד כאן..."/>
      </div>
      <button class="btn full" id="submitBtn" style="margin-top:10px">בדוק תשובה</button>
    `;
  } else {
    bodyHTML = `<div class="choices">
      ${q.choices.map((c,i)=>`<button class="choice${q.ltrChoices?' ltr':''}" data-choice="${i}">${c}</button>`).join('')}
    </div>`;
  }

  const speakBtn = q.speak ? `<button class="speak-btn" id="speakBtn">🔊 שמע</button>` : '';

  document.getElementById('main').innerHTML = `
  <div class="question-wrap">
    <div class="q-header">
      <span class="ltr-inline">${session.current+1}/${total}</span>
      <div class="q-progress"><div class="q-progress-fill" style="width:${pct}%"></div></div>
      <span>⭐ ${session.correct}</span>
    </div>
    <div class="q-card">
      <div class="q-prompt">${q.prompt}</div>
      <div class="${q.contentClass||'q-content'}">${q.content}</div>
      ${dots}
      ${speakBtn}
    </div>
    ${bodyHTML}
  </div>`;

  if(q.speak) document.getElementById('speakBtn').addEventListener('click', ()=>speak(q.speak, q.speakLang||'en-US'));
  if(q.input){
    const inp = document.getElementById('answerInput');
    inp.focus();
    inp.addEventListener('keydown',(e)=>{ if(e.key==='Enter') submitTyped(); });
    document.getElementById('submitBtn').addEventListener('click', submitTyped);
  } else {
    document.querySelectorAll('.choice').forEach(el=>{
      el.addEventListener('click',()=>chooseAnswer(+el.dataset.choice));
    });
  }
}

function chooseAnswer(idx){
  if(session.locked) return;
  const q = session.questions[session.current];
  const chosen = q.choices[idx];
  const correct = String(chosen) === String(q.answer);
  handleAnswer(correct, idx);
}
function submitTyped(){
  if(session.locked) return;
  const q = session.questions[session.current];
  const val = document.getElementById('answerInput').value.trim().toLowerCase();
  const correct = val === String(q.answer).toLowerCase();
  handleAnswer(correct, null);
}

function handleAnswer(correct, idx){
  session.locked = true;
  session.answered++;
  state.stats.totalAnswered++;
  if(correct){
    session.correct++;
    state.stats.totalCorrect++;
    addStars(1, 'answer');
    playSound('right');
    showFeedback(pickPraise(), 'right');
    updateStreak(true);
    if(state.stats.totalCorrect===1) unlockAchievement('first');
    // mark choice
    if(idx!==null){ document.querySelectorAll('.choice').forEach((el,i)=>{ if(i===idx) el.classList.add('right'); else el.classList.add('dim'); }); }
    // tts
    const q = session.questions[session.current];
    if(q.speak) setTimeout(()=>speak(q.speak, q.speakLang||'en-US'), 200);
    // sparkle
    const r = (idx!==null?document.querySelectorAll('.choice')[idx]:document.querySelector('.q-card')).getBoundingClientRect();
    sparkleAt(r.left+r.width/2, r.top+r.height/2, 6);
    // mission progress
    const dom = q.domain || 'english';
    if(session.params.mode==='math' || dom==='math') progressMission('math',1);
    if(session.params.mode==='english' || dom==='english') progressMission('english',1);
    // multiplication mastery
    if(q.multTable){
      state.math.multiplication[q.multTable] = state.math.multiplication[q.multTable]||{correct:0,total:0};
      state.math.multiplication[q.multTable].correct++;
      state.math.multiplication[q.multTable].total++;
      if(q.multTable===7 && state.math.multiplication[7].correct>=12) unlockAchievement('mult7');
      if(q.multTable===10 && state.math.multiplication[10].correct>=12) unlockAchievement('mult10');
      saveState();
    }
    // english category progress
    if(session.params.mode==='english'){
      const cat = session.params.cat;
      state.english.categories[cat] = state.english.categories[cat] || {answered:0, correct:0};
      state.english.categories[cat].answered++;
      state.english.categories[cat].correct++;
      if(cat==='abc' && state.english.categories.abc.correct>=26) unlockAchievement('abcMaster');
      saveState();
    }
    if(session.params.mode==='math'){
      const cat = session.params.cat;
      state.math.categories[cat] = state.math.categories[cat] || {answered:0, correct:0};
      state.math.categories[cat].answered++;
      state.math.categories[cat].correct++;
      saveState();
    }
  } else {
    playSound('wrong');
    showFeedback(`🤔 ${getName()}, ננסה שוב!`, 'wrong');
    updateStreak(false);
    if(idx!==null){
      document.querySelectorAll('.choice').forEach((el,i)=>{
        if(i===idx) el.classList.add('wrong');
        if(String(session.questions[session.current].choices[i])===String(session.questions[session.current].answer)) el.classList.add('right');
      });
    } else {
      const inp = document.getElementById('answerInput');
      if(inp) inp.classList.add('wrong'), inp.style.borderColor='#EF4444';
      const correctBox = document.createElement('div');
      correctBox.style.cssText='text-align:center;color:#EF4444;font-weight:700;margin-top:10px;font-size:18px';
      correctBox.textContent = `התשובה: ${session.questions[session.current].answer}`;
      document.querySelector('.question-wrap').appendChild(correctBox);
    }
  }
  saveState();
  setTimeout(()=>{
    session.current++;
    session.locked = false;
    if(session.current >= session.questions.length) finishSession();
    else renderQuestion();
  }, correct ? 1100 : 1900);
}

function finishSession(){
  const p = session.params;
  const correct = session.correct;
  const total = session.questions.length;
  const pct = Math.round(correct/total*100);

  if(p.mode==='station'){
    const sd = stationData(p.station);
    const need = Math.ceil(sd.questions*ageConfig().adventure.passRatio);
    const passed = correct>=need;
    if(passed){
      if(!state.adventure.completed.includes(p.station)){
        state.adventure.completed.push(p.station);
        if(p.station===state.adventure.currentStation){
          state.adventure.currentStation = Math.min(31, p.station+1);
        }
        progressMission('station',1);
      }
      // companion unlocks
      if(p.station===5 && !state.adventure.companions.includes('🐕')) state.adventure.companions.push('🐕');
      if(p.station===10){ state.adventure.companions.push('🐱'); unlockAchievement('station10'); }
      if(p.station===20){ state.adventure.companions.push('🦅'); unlockAchievement('station20'); }
      if(p.station===30){ unlockAchievement('rescue'); }
      saveState();
      playSound('levelUp');
      confettiBurst();
    } else {
      playSound('wrong');
    }
    document.getElementById('main').innerHTML = `
      <div class="section" style="text-align:center;padding-top:40px">
        <div style="font-size:96px">${passed?(p.station===30?'👸':'🎉'):'😢'}</div>
        <h2 style="margin:14px 0">${passed?(p.station===30?`${getName()} הציל את הנסיכה!`:`${getName()}, תחנה הושלמה!`):`${getName()}, ננסה שוב!`}</h2>
        <div class="card" style="margin:14px 0">
          <div style="font-size:28px;font-weight:700" class="ltr">${correct}/${total}</div>
          <div style="color:var(--ink-soft)">${pct}% תשובות נכונות</div>
          <div style="margin-top:10px;color:var(--primary-dark);font-weight:700">+${correct} ⭐</div>
        </div>
        ${passed && p.station<30 ? `<div class="bubble">${levelUpMessage(p.station)}תחנה ${p.station+1} פתוחה! 🚀</div>`:''}
        ${p.station===30 && passed ? `<div class="bubble">${ADVENTURE_STORIES.rescue()}</div>`:''}
        <button class="btn full" onclick="go('adventure')" style="margin-top:14px">חזור למפה</button>
        <button class="btn ghost full" onclick="go('home')" style="margin-top:8px">לעמוד הבית</button>
      </div>`;
  } else {
    if(pct>=80 && p.mode==='english' && !state.achievements.find(a=>a.id==='firstCat')) unlockAchievement('firstCat');
    document.getElementById('main').innerHTML = `
      <div class="section" style="text-align:center;padding-top:40px">
        <div style="font-size:96px">${pct>=80?'🌟':pct>=50?'👍':'💪'}</div>
        <h2 style="margin:14px 0">${pct>=80?'מצוין!':pct>=50?'טוב מאוד!':'תרגול עושה את המורה!'}</h2>
        <div class="card" style="margin:14px 0">
          <div style="font-size:28px;font-weight:700" class="ltr">${correct}/${total}</div>
          <div style="color:var(--ink-soft)">${pct}% תשובות נכונות</div>
          <div style="margin-top:10px;color:var(--primary-dark);font-weight:700">+${correct} ⭐</div>
        </div>
        <button class="btn full" onclick="go('${p.mode}')">עוד תרגול</button>
        <button class="btn ghost full" onclick="go('home')" style="margin-top:8px">לעמוד הבית</button>
      </div>`;
    if(pct>=80) confettiBurst();
  }
}

/* ============================================================
   PWA INSTALL
   ============================================================ */
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(()=>document.getElementById('installBanner').classList.add('show'), 6000);
});
function doInstall(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{ deferredPrompt = null; document.getElementById('installBanner').classList.remove('show'); });
}
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}

/* ============================================================
   WELCOME / NAME / AGE ENTRY
   ============================================================ */
function showWelcome(opts={}){
  const bg = document.getElementById('welcomeBg');
  const step = opts.step || (opts.changeAgeOnly ? 'age'
              : opts.changeNameOnly ? 'name'
              : !state.profile.name ? 'name'
              : !state.profile.ageGroup ? 'age'
              : 'name');
  bg.classList.add('show');
  if(step==='name') renderWelcomeName(opts);
  else renderWelcomeAge(opts);
}
function renderWelcomeName(opts){
  const card = document.getElementById('welcomeCard');
  const isChanging = opts.changeNameOnly;
  card.innerHTML = `
    <div class="welcome-emoji">👋</div>
    <h2 class="welcome-title">${isChanging?'שינוי שם':'שלום!'}</h2>
    <p class="welcome-sub">${isChanging?'איך נקרא לך עכשיו?':'מה השם שלך?'}</p>
    <input type="text" id="welcomeName" class="welcome-input" placeholder="הקלד את השם שלך" maxlength="20" autocomplete="given-name" value="${(isChanging?state.profile.name:'') || ''}"/>
    <button class="welcome-btn" id="welcomeBtn">${isChanging?'שמור 💾':'המשך ➡️'}</button>
    ${isChanging?'':'<p class="welcome-hint">אפשר גם לדלג — נקרא לך "חבר/ה"</p>'}
  `;
  const inp = card.querySelector('#welcomeName');
  const btn = card.querySelector('#welcomeBtn');
  setTimeout(()=>inp.focus(),120);
  const submit = ()=>{
    const v = inp.value.trim();
    state.profile.name = v.slice(0,20);
    saveState();
    playSound('mission');
    if(isChanging){
      document.getElementById('welcomeBg').classList.remove('show');
      render();
      if(v) showFeedback(`שלום ${v}! 👋`, 'right');
    } else {
      // continue to age step
      if(state.profile.ageGroup){
        document.getElementById('welcomeBg').classList.remove('show');
        render();
        if(v) showFeedback(`שלום ${v}! 👋`, 'right');
      } else {
        renderWelcomeAge({fromName:true});
      }
    }
  };
  btn.onclick = submit;
  inp.onkeydown = e=>{ if(e.key==='Enter') submit(); };
}
function renderWelcomeAge(opts){
  const card = document.getElementById('welcomeCard');
  const isChanging = opts.changeAgeOnly;
  const current = state.profile.ageGroup;
  card.innerHTML = `
    <div class="welcome-emoji">🎂</div>
    <h2 class="welcome-title">${isChanging?'שינוי גיל':'קבוצת גיל'}</h2>
    <p class="welcome-sub">בן/בת כמה?</p>
    <div class="age-list">
      ${AGE_GROUPS.map(g=>`
        <button class="age-btn ${current===g.id?'selected':''}" data-age="${g.id}">
          <span class="em">${g.emoji}</span>
          <span class="text">${g.label}</span>
        </button>
      `).join('')}
    </div>
    <p class="welcome-hint">תמיד אפשר לשנות מאוחר יותר</p>
  `;
  card.querySelectorAll('.age-btn').forEach(b=>{
    b.onclick = ()=>{
      const ageId = b.dataset.age;
      state.profile.ageGroup = ageId;
      saveState();
      playSound('mission');
      card.querySelectorAll('.age-btn').forEach(x=>x.classList.remove('selected'));
      b.classList.add('selected');
      // confirm + close after a beat
      setTimeout(()=>{
        document.getElementById('welcomeBg').classList.remove('show');
        render();
        const g = AGE_GROUPS.find(x=>x.id===ageId);
        showFeedback(`${g.emoji} ${g.label}`, 'right');
      }, 350);
    };
  });
}
function changeName(){ showWelcome({changeNameOnly:true}); }
function changeAge(){ showWelcome({changeAgeOnly:true}); }
